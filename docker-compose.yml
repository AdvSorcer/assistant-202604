services:
  api:
    build:
      context: ./backend/Assistant.Api
    env_file:
      - path: .env
        required: false
    environment:
      ConnectionStrings__Default: Data Source=/app/data/assistant.db
      Cors__AllowedOrigins__0: http://localhost:8080
    ports:
      - "5251:8080"
    volumes:
      - assistant-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5251/api
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  assistant-data:
